{% extends "base.html" %}

{% block title %}Matches{% endblock %}

{% block content %}

<h1>Your Matches 💥</h1>

<div style="width:90%; max-width:500px; margin:auto;">

{% if matches %}

    {% for match in matches %}

        <div class="card">

            <h3>{{ match[1] }}</h3>
            <p>{{ match[2] }}</p>

            <a href="/chat/{{ match[0] }}" class="btn btn-primary">
                Message
            </a>

        </div>

    {% endfor %}

{% else %}

    <div class="card">
        <p>No matches yet.</p>
        <a href="/" class="btn btn-primary">Start Swiping</a>
    </div>

{% endif %}

</div>

{% endblock %}
