{% extends "base.html" %}

{% block content %}

<h2>Edit Profile</h2>

<form method="POST" class="card">

    <label>Bio</label>
    <textarea name="bio">{{ user["bio"] }}</textarea>

    <label>Looking For</label>

    <label>
        <input type="checkbox" name="looking_for" value="tennis">
        Tennis
    </label>

    <label>
        <input type="checkbox" name="looking_for" value="casual">
        Casual
    </label>

    <label>
        <input type="checkbox" name="looking_for" value="serious">
        Serious
    </label>

    <label>UTR (1–16.5)</label>
    <input type="number" name="UTR" min="1" max="16.5" step="0.1"
           value="{{ user["UTR"] }}">

    <label>Location</label>
    <input type="text" name="location" value="{{ user["location"] }}">

    <button type="submit" class="btn btn-primary">Save</button>

</form>

{% endblock %}
