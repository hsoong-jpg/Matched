{% extends "base.html" %}

{% block title %}PageName{% endblock %}

{% block content %}
<h1>People You Liked</h1>

{% if liked %}
    {% for user in liked %}
        <div>
            <h3>{{ user[1] }}</h3>
            <p>{{ user[2] }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>You haven't liked anyone yet.</p>
{% endif %}
{% endblock %}
