<h1>People Who Liked You</h1>

{% if likes %}
    {% for user in likes %}
        <div>
            <h3>{{ user[1] }}</h3>
            <p>{{ user[2] }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>No likes yet.</p>
{% endif %}
