{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}

<h2>Chat</h2>

<style>
#chat {
    height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    background: white;
    border-radius: 12px;
}

.message {
    max-width: 60%;
    padding: 10px;
    border-radius: 15px;
    font-size: 14px;
    word-wrap: break-word;
}

.sent {
    align-self: flex-end;
    background-color: #DCF8C6;
}

.received {
    align-self: flex-start;
    background-color: #E5E5EA;
}

.time {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 4px;
}
</style>

<div id="chat">

  {% for msg in messages %}

    <div class="message {% if msg[0] == session['user_id'] %}sent{% else %}received{% endif %}">

        <div>{{ msg[2] }}</div>

        <div class="time">
            {{ msg[3] }}

            {% if msg[0] == session['user_id'] %}
                {% if msg[4] == 1 %}
                    ✔✔
                {% else %}
                    ✔
                {% endif %}
            {% endif %}
        </div>

    </div>

  {% endfor %}

</div>

<div id="typing"></div>

<input id="msg" placeholder="Type message...">
<button onclick="sendMessage()" class="btn btn-primary">Send</button>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

const user1 = Number("{{ session['user_id'] }}");
const user2 = Number("{{ user_id }}");

const room = "chat_" + Math.min(user1, user2) + "_" + Math.max(user1, user2);

socket.emit("join", { room: room });

function scrollToBottom() {
    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
}

/* SAFE MESSAGE ESCAPING */
function escapeHtml(text) {
    return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

/* RECEIVE */
socket.on("receive_message", function(data) {

    const div = document.getElementById("chat");

    const isMe = data.sender_id === user1;

    div.innerHTML += `
        <div class="message ${isMe ? 'sent' : 'received'}">
            <div>${escapeHtml(data.message)}</div>
        </div>
    `;

    scrollToBottom();
});

/* SEND */
function sendMessage() {
    const input = document.getElementById("msg");
    const msg = input.value.trim();

    if (!msg) return;

    socket.emit("send_message", {
        receiver_id: user2,
        message: msg
    });

    socket.emit("stop_typing", { room });

    input.value = "";
}

/* TYPING */
let typingTimeout;

document.getElementById("msg").addEventListener("input", function() {

    socket.emit("typing", { room });

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(() => {
        socket.emit("stop_typing", { room });
    }, 1000);
});

socket.on("show_typing", function(data) {
    if (data.user_id !== user1) {
        document.getElementById("typing").innerText = "Typing...";
    }
});

socket.on("hide_typing", function() {
    document.getElementById("typing").innerText = "";
});

window.onload = scrollToBottom;
</script>

{% endblock %}
