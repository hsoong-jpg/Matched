{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}

<h2>Chat</h2>

<style>
#chat {
    height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    background: white;
    border-radius: 12px;
    border: 1px solid #ddd;
}

.message {
    max-width: 60%;
    padding: 10px;
    border-radius: 15px;
    font-size: 14px;
    word-wrap: break-word;
}

.sent {
    align-self: flex-end;
    background-color: #DCF8C6;
}

.received {
    align-self: flex-start;
    background-color: #E5E5EA;
}

.time {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 4px;
}

#typing {
    font-size: 12px;
    color: gray;
    margin-top: 5px;
}
</style>

<div id="chat">

    {% for msg in messages %}
        <div class="message {% if msg.sender_id == user_id %}sent{% else %}received{% endif %}">
            <div>{{ msg.message }}</div>
            <div class="time">{{ msg.timestamp }}</div>
        </div>
    {% endfor %}

</div>

<div id="typing"></div>

<input id="msg" placeholder="Type message..." autocomplete="off">
<button onclick="sendMessage()">Send</button>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

const userId = Number("{{ user_id }}");
const receiverId = Number("{{ receiver_id }}");

const room = "chat_" + Math.min(userId, receiverId) + "_" + Math.max(userId, receiverId);

// join room
// join room AFTER socket connects
socket.on("connect", function () {

    console.log("Connected to socket");

    socket.emit("join", {
        receiver_id: receiverId
    });

});

// scroll helper
function scrollToBottom() {
    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
}

// escape HTML
function escapeHtml(text) {
    return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

// receive message
socket.on("receive_message", function(data) {

    const chat = document.getElementById("chat");

    const isMe = data.sender_id === userId;

    chat.innerHTML += `
        <div class="message ${isMe ? 'sent' : 'received'}">
            <div>${escapeHtml(data.message)}</div>
            <div class="time">${data.timestamp || ""}</div>
        </div>
    `;

    scrollToBottom();
});

// send message
function sendMessage() {
    const input = document.getElementById("msg");
    const msg = input.value.trim();

    if (!msg) return;

    socket.emit("send_message", {
        receiver_id: receiverId,
        message: msg
    });

    input.value = "";
}

// auto scroll on load
window.onload = scrollToBottom;
</script>

{% endblock %}
