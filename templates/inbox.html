{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}
<h2>Inbox 💬</h2>
<style>
#inbox {
    display: flex;
    flex-direction: column;
}

.chat-item {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-decoration: none;
    color: black;
    display: block;
}

.chat-item:hover {
    background-color: #f5f5f5;
}

.top {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
}

.bottom {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: gray;
}

.badge {
    background: red;
    color: white;
    border-radius: 50%;
    padding: 4px 8px;
    font-size: 12px;
}
</style>
<div id="inbox">
  {% for user in matches %}
    <a href="/chat/{{ user[0] }}" class="chat-item">

      <div class="top">
        <span class="name">{{ user[1] }}</span>
        <span class="time">{{ user[3] if user[3] else "" }}</span>
      </div>

      <div class="bottom">
        <span class="preview">
          {{ user[2] if user[2] else "No messages yet" }}
        </span>

        {% if user[4] > 0 %}
          <span class="badge">{{ user[4] }}</span>
        {% endif %}
      </div>

    </a>
  {% endfor %}
</div>
{% endblock %}
