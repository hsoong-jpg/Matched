{% extends "base.html" %}

{% block title %}Inbox{% endblock %}

{% block content %}

<h2>Inbox 💬</h2>

<style>
.inbox {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 15px;
}

.chat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 14px;
    border: 1px solid #eee;
    border-radius: 10px;

    text-decoration: none;
    color: black;

    transition: 0.2s;
}

.chat-item:hover {
    background: #f5f5f5;
}

.name {
    font-weight: bold;
    font-size: 16px;
}
</style>

<div class="inbox">

  {% for user in matches %}

    <a href="/chat/{{ user[0] }}" class="chat-item">

        <div class="name">
            {{ user[1] }}
        </div>

    </a>

  {% endfor %}

</div>

{% endblock %}
