<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Matched{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: auto;
            padding: 15px;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding: 6px 8px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            background: #eef2ff;
            color: #4f46e5;
        }

        .active {
            color: #4f46e5;
            border-bottom: 2px solid #4f46e5;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary { background: #4f46e5; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        /* CARD */
        .card {
            padding: 20px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin: 10px 0;
        }
        input, textarea {
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #111;
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
    outline: none;
}

input:focus, textarea:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
}
    </style>
</head>

<body>

    <!-- NAVBAR -->
    {% if session.get("user_id") and request.path not in ['/login', '/signup'] %}
    <div class="navbar">
        <b>Matched 🎾</b>

        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/matches" class="{% if '/matches' in request.path %}active{% endif %}">Matches</a>
            <a href="/inbox" class="{% if '/inbox' in request.path %}active{% endif %}">Inbox</a>
            <a href="/profile" class="{% if '/profile' in request.path %}active{% endif %}">Profile</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    {% endif %}

    <!-- PAGE CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
