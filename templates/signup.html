{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<h1>Create Account</h1>

<form method="POST" class="card">

    <input type="text" name="name" placeholder="Name" required><br><br>

    <input type="text" name="bio" placeholder="Bio"><br><br>

    <input type="text" name="username" placeholder="Username" required autocomplete="username"><br><br>

    <input type="password" name="password" placeholder="Password" required autocomplete="new-password" minlength="6"><br><br>

    <label>Gender</label><br>
    <input type="radio" name="gender" value="Male" required> Male<br>
    <input type="radio" name="gender" value="Female"> Female<br>
    <input type="radio" name="gender" value="Other"> Other<br>

    <br>

    <label>What are you looking for? (select at least one)</label><br>

    <input type="checkbox" name="looking_for" value="Competitive Singles"> Competitive Singles<br>
    <input type="checkbox" name="looking_for" value="Competitive Doubles"> Competitive Doubles<br>
    <input type="checkbox" name="looking_for" value="Casual Hitting"> Casual Hitting<br>

    <br>

    <input type="number" step="0.1" name="UTR"
           placeholder="UTR (e.g. 7.5)"
           min="1" max="16.5" required><br><br>

    <input type="text" name="location"
           placeholder="Your city (e.g. Columbus)" required><br><br>

    <input type="number" name="max_distance"
           min="0" step="0.1"
           placeholder="Max distance (miles)" required>

    <br><br>

    <button type="submit" class="btn btn-primary">Sign Up</button>

</form>

<br>

<a href="/login">Already have an account? Login</a>

{% endblock %}
