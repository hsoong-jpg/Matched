{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<h1>Create Account</h1>

<form method="POST">

    <input type="text" name="name" placeholder="Name" required><br><br>

    <input type="text" name="bio" placeholder="Bio"><br><br>

    <input type="text" name="username" placeholder="Username" required><br><br>

    <input type="password" name="password" placeholder="Password" required><br><br>

    <!-- Gender (REQUIRED) -->
    <label>Gender</label><br>

    <input type="radio" name="gender" value="Male" required> Male<br>
    <input type="radio" name="gender" value="Female"> Female<br>
    <input type="radio" name="gender" value="Other"> Other<br>

    <br>

    <!-- Looking For -->
    <label>What are you looking for?</label><br>

    <input type="checkbox" name="looking_for" value="Competitive Singles"> Competitive Singles<br>
    <input type="checkbox" name="looking_for" value="Competitive Doubles"> Competitive Doubles<br>
    <input type="checkbox" name="looking_for" value="Casual Hitting"> Casual Hitting<br>

    <br>

    <!-- UTR -->
    <input type="number" step="0.1" name="UTR" placeholder="UTR (e.g. 7.5)">

   <br>
    <input type="text" name="location" placeholder="Your city (e.g. Columbus)"><br><br>
   <br>
  <input type="number" step="0.1" name="max_distance" placeholder="Max distance (miles)"><br><br>
   <br>
    <button type="submit">Sign Up</button>

</form>

<br>
<a href="/login">Already have an account? Login</a>

{% endblock %}
