<!DOCTYPE html>
<html>

<head>
    <title>Swipe App</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        /* MAIN PROFILE CARD */
        .card {
            background: white;
            width: 320px;
            padding: 20px;

            border-radius: 12px;
            text-align: center;

            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        /* NAME */
        .name {
            font-size: 24px;
            font-weight: bold;
        }

        /* INFO TEXT */
        .info {
            margin-top: 8px;
            color: #444;
        }

        /* BUTTON CONTAINER */
        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;

            font-size: 18px;
            font-weight: bold;

            border: none;
            border-radius: 10px;

            cursor: pointer;
        }

        .like {
            background: #4CAF50;
            color: white;
        }

        .pass {
            background: #f44336;
            color: white;
        }

        /* NAV LINKS */
        .nav {
            position: absolute;
            top: 20px;
        }

        .nav a {
            margin: 10px;
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
    <a href="/matches">Matches</a>
    <a href="/likes">Likes</a>
    <a href="/logout">Logout</a>
</div>

<!-- PROFILE CARD -->
{% if no_profiles %}

<div class="card">
    <div class="name">No more profiles</div>
    <div class="info">You're all caught up 🎉</div>
</div>

{% else %}

<!-- PROFILE CARD -->
<div class="card">

    <!-- NAME -->
    <div class="name">
        {{ profile.name }}
    </div>

    <!-- gENDER -->
    <div class="info">
        gender: {{ profile.gender }}
    </div>

    <!-- UTR -->
    <div class="info">
        utr: {{ profile.utr }}
    </div>

    <!-- BIO -->
    <div class="info">
        Bio: {{ profile.bio }}
    </div>

  

    <!-- BUTTONS -->
    <div class="buttons">

        <form action="/pass" method="POST">
            <button class="pass">Pass</button>
        </form>

        <form action="/like" method="POST">
            <button class="like">Like</button>
        </form>

    </div>

</div>

</body>
</html>
