{% extends "base.html" %}

{% block title %}Swipe{% endblock %}

{% block content %}

<div class="swipe-container">

  {% if users|length == 0 %}
    <div class="card">
      <h2>No more profiles 🎉</h2>
    </div>
  {% else %}

    {% for user in users %}
      <div class="card">
        <h2>{{ user[1] }}</h2>
        <p>{{ user[2] }}</p>
        <p>{{ user[3] }}</p>

        <form method="POST" action="/like">
          <input type="hidden" name="liked_user_id" value="{{ user[0] }}">
          <button>❤️ Like</button>
        </form>

        <form method="POST" action="/pass">
          <button>❌ Pass</button>
        </form>
      </div>
    {% endfor %}

  {% endif %}

</div>

{% endblock %}
